name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          
          echo "--- Erasing Local Tracking Cache ---"
          git checkout -f main || git checkout -f master
          git fetch --all
          git reset --hard origin/main || git reset --hard origin/master
          git clean -fd
          
          echo "--- Running Django Asset Compilations ---"
          source venv/bin/activate
          python3 manage.py collectstatic --noinput
          
          echo "--- Natively Restarting via Supervisor ---"
          supervisorctl restart kaanuro || supervisorctl restart all
          
          echo "--- Confirming Fixed Commit Hash ---"
          git rev-parse --short HEAD
