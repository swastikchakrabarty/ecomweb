name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          git reset --hard origin/main
          source venv/bin/activate
          
          echo "--- Natively Restarting via Supervisor ---"
          supervisorctl restart kaanuro || supervisorctl restart all
          
          echo "--- Checking Status ---"
          sleep 2
          supervisorctl status
