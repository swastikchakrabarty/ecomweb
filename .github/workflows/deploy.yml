name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          git reset --hard origin/main
          source venv/bin/activate
          
          # Run check to see exactly where Django is breaking
          echo "--- Running Django Diagnostics ---"
          python3 manage.py check || true
          
          # Clean socket locks and cycle processes
          rm -f gunicorn.sock gunicorn.pid || true
          pkill -9 -f gunicorn || true
          
          systemctl restart gunicorn || supervisorctl restart all || true
          
          # Print the last 20 lines of system logs to see the python crash reason
          echo "--- Live Server Error Logs ---"
          journalctl -u gunicorn -n 20 --no-pager || tail -n 20 /var/log/syslog || tail -n 20 /var/log/nginx/error.log || true
          
          # Explicitly exit 0 so GitHub marks this step as successful
          exit 0
