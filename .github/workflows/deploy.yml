name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          git reset --hard origin/main
          source venv/bin/activate
          
          echo "--- Aggressively Clearing Old Zombie Processes ---"
          pkill -9 -f gunicorn || true
          
          echo "--- Launching via Verified Supervisor Context ---"
          supervisorctl reread || true
          supervisorctl update || true
          supervisorctl restart kaanuro || supervisorctl restart all || true
          
          echo "--- Verifying Active Status ---"
          sleep 3
          supervisorctl status
