name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          git reset --hard origin/main
          source venv/bin/activate
          
          echo "--- Checking Supervisor Daemon Status ---"
          supervisorctl status || true
          
          echo "--- Checking Active Running System Services ---"
          systemctl list-units --type=service | grep -E "gunicorn|django|kaanuro" || true
          
          echo "--- Attempting Supervisor Safe Reload ---"
          supervisorctl reread || true
          supervisorctl update || true
          supervisorctl restart all || true
          
          echo "--- Fallback Standalone Launch ---"
          # If no processes are running, force boot a clean socket listener manually
          if ! pgrep -f gunicorn > /dev/null; then
             echo "No active process found. Launching clean standalone application daemon..."
             gunicorn --workers 3 --bind unix:/var/www/kaanuro/gunicorn.sock ecomweb.wsgi:application --detach || true
          fi
          
          echo "--- Verifying Active Listening Ports/Sockets ---"
          ls -la /var/www/kaanuro/*.sock || true
          pgrep -a gunicorn || true
