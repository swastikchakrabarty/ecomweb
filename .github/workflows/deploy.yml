name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          # Force clear any local locks or modifications on the server side
          git merge --abort || true
          git stash clear || true
          git clean -df
          git fetch origin main
          git reset --hard origin/main
          
          # Run Django asset compilations
          source venv/bin/activate
          python3 manage.py collectstatic --noinput
          python3 manage.py migrate --noinput
          
          # Force cycle the backend daemons
          pkill -9 -f gunicorn || true
          supervisorctl restart all || systemctl restart gunicorn
