name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          
          echo "--- Tail of Gunicorn Logs ---"
          journalctl -u gunicorn -n 50 --no-pager || tail -n 50 /var/log/syslog || true
          
          echo "--- Tail of Nginx Error Logs ---"
          tail -n 50 /var/log/nginx/error.log || true
