name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          git reset --hard origin/main
          source venv/bin/activate
          
          # Clean socket paths cleanly without killing the parent shell process
          rm -f gunicorn.sock gunicorn.pid || true
          
          echo "--- Gracefully Cycling Services ---"
          # Try resetting via standard init wrappers first
          systemctl daemon-reload || true
          systemctl restart gunicorn || service gunicorn restart || supervisorctl restart all || true
          
          # Final safety check: if it didn't start, boot a detached background worker explicitly
          sleep 2
          if ! pgrep -f gunicorn > /dev/null; then
             echo "Launching detached standalone daemon..."
             gunicorn --workers 3 --bind unix:/var/www/kaanuro/gunicorn.sock ecomweb.wsgi:application --detach || true
          fi
          
          echo "🚀 Web layout routing successfully booted."
