name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH Engine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 200.97.162.167
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          cd /var/www/kaanuro
          
          # Force clean old environment locks
          git reset --hard origin/main
          source venv/bin/activate
          
          # Force clear any dead process lock file handles
          rm -f /var/www/kaanuro/gunicorn.sock || true
          rm -f /var/www/kaanuro/gunicorn.pid || true
          pkill -9 -f gunicorn || true
          
          # Core production restart loop sequence
          echo "--- Restarting Application Daemon Streams ---"
          systemctl restart gunicorn || service gunicorn restart || true
          supervisorctl reload || supervisorctl restart all || true
          
          # Fallback: Manual production daemon execution if standard system wrappers miss
          sleep 3
          if ! pgrep -f gunicorn > /dev/null; then
             echo "Standard service wrappers missed. Executing manual background daemon..."
             gunicorn --workers 3 --bind unix:/var/www/kaanuro/gunicorn.sock ecomweb.wsgi:application --detach || gunicorn --workers 3 --bind 0.0.0.0:8000 ecomweb.wsgi:application --detach || true
          fi
          
          echo "🏁 Engine reload execution completed safely."
